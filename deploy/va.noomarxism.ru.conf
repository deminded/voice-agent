# voice-agent reverse proxy for va.noomarxism.ru
# Place at /etc/nginx/sites-available/va.noomarxism.ru and symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name va.noomarxism.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name va.noomarxism.ru;

    # certbot will fill these on first run; leaving placeholder paths for clarity.
    ssl_certificate     /etc/letsencrypt/live/va.noomarxism.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/va.noomarxism.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Voice-agent app (FastAPI on 8765)
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;

        # WebSocket upgrade for /ws — agent streams transcripts/audio over it.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Disable buffering so streamed TTS chunks reach the client promptly.
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}

# Map needed for Connection: upgrade header above.
# If the parent nginx.conf already defines $connection_upgrade,
# delete this block — duplicates fail nginx -t.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
