# voice-agent reverse proxy for va.noomarxism.ru
# HTTP-only stub. certbot --nginx will inject HTTPS block + redirect on first run.

# Map needed for WebSocket upgrade. If parent nginx.conf already defines
# $connection_upgrade, delete this block — duplicates fail nginx -t.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name va.noomarxism.ru;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
