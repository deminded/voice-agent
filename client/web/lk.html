<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>voice-agent · live</title>
<style>
  :root { color-scheme: light dark; --bg:#0f1115; --fg:#e6e8ec; --muted:#8a8f99; --accent:#6ea8ff; --warn:#ff9e6e; --you:#b1d4ff; --them:#d8b6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:16px/1.45 -apple-system,"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--fg); display:flex; flex-direction:column; height:100vh; }
  header { padding:12px 16px; border-bottom:1px solid #222; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  header h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:0.02em; color:var(--muted); }
  .status { font-size:12px; color:var(--muted); }
  .status.live { color:#6eff8e; }
  .status.err { color:var(--warn); }
  .indicator { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
  .dot.on { background:#6eff8e; box-shadow:0 0 8px #6eff8e; }
  main { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
  .turn { padding:10px 14px; border-radius:10px; max-width:85%; }
  .you { background:rgba(177,212,255,0.08); color:var(--you); align-self:flex-end; }
  .them { background:rgba(216,182,255,0.08); color:var(--them); align-self:flex-start; }
  .label { font-size:11px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.05em; }
  .turn.partial { opacity:0.6; }
  footer { padding:16px; border-top:1px solid #222; display:flex; gap:12px; align-items:center; justify-content:center; }
  button.action { appearance:none; border:0; background:var(--accent); color:#000; padding:10px 24px; font:inherit; font-size:14px; font-weight:600; border-radius:8px; cursor:pointer; }
  button.action:disabled { background:#2a2d35; color:var(--muted); cursor:default; }
  button.action.live { background:#ff6e6e; }
  .hint { font-size:12px; color:var(--muted); }
  .mode-group { display:inline-flex; border:1px solid #2a2d35; border-radius:8px; overflow:hidden; }
  button.mode { appearance:none; border:0; background:transparent; color:var(--muted); padding:8px 14px; font:inherit; font-size:13px; cursor:pointer; border-right:1px solid #2a2d35; }
  button.mode:last-child { border-right:0; }
  button.mode:disabled { cursor:default; opacity:0.5; }
  button.mode.active { background:var(--accent); color:#000; font-weight:600; }
  .dot.muted { background:#ff6e6e; box-shadow:0 0 8px #ff6e6e; }
</style>
</head>
<body>

<header>
  <h1>voice-agent · live</h1>
  <span id="status" class="status">disconnected</span>
  <div class="indicator"><span id="micDot" class="dot"></span> <span id="micLabel">mic</span></div>
  <div class="indicator"><span id="agentDot" class="dot"></span> agent</div>
</header>

<main id="log"></main>

<footer>
  <span id="hint" class="hint">click connect, then just talk — the agent handles turns</span>
  <div id="modeGroup" class="mode-group" style="display:none;">
    <button id="modeAuto" class="mode" data-mode="auto" disabled>auto</button>
    <button id="modeOn" class="mode" data-mode="always-on" disabled>always on</button>
    <button id="modeOff" class="mode" data-mode="always-off" disabled>always off</button>
  </div>
  <button id="interjectBtn" class="action" disabled style="display:none;background:var(--warn);color:#000;">interject</button>
  <button id="connectBtn" class="action">connect</button>
</footer>

<script type="module">
import { Room, RoomEvent, Track, RemoteTrack } from "https://esm.sh/livekit-client@2.13.6";

const status = document.getElementById('status');
const log = document.getElementById('log');
const micDot = document.getElementById('micDot');
const micLabel = document.getElementById('micLabel');
const agentDot = document.getElementById('agentDot');
const connectBtn = document.getElementById('connectBtn');
const hint = document.getElementById('hint');
const modeGroup = document.getElementById('modeGroup');
const modeBtns = modeGroup.querySelectorAll('button.mode');
const interjectBtn = document.getElementById('interjectBtn');

let room = null;
let connected = false;

const Mode = { AUTO: 'auto', ALWAYS_ON: 'always-on', ALWAYS_OFF: 'always-off' };
let mode = Mode.ALWAYS_ON;       // headphones default; switch to AUTO for room
let userOverride = false;        // true when user manually unmuted during agent speech
let agentSpeaking = false;
let agentOffTimer = null;        // debounce off-transitions to ride sentence pauses

// transcript bubbles, keyed by id; partial -> final replaces in place
const bubbles = new Map();

function setStatus(text, cls = '') {
  status.textContent = text;
  status.className = 'status' + (cls ? ' ' + cls : '');
}

function bubble(id, who, text, partial) {
  let b = bubbles.get(id);
  if (!b) {
    b = document.createElement('div');
    b.className = 'turn ' + who + (partial ? ' partial' : '');
    b.innerHTML = `<div class="label">${who === 'you' ? 'you' : 'claude'}</div><div class="text"></div>`;
    bubbles.set(id, b);
    log.appendChild(b);
  }
  b.classList.toggle('partial', !!partial);
  b.querySelector('.text').textContent = text;
  log.scrollTop = log.scrollHeight;
}

async function connect() {
  connectBtn.disabled = true;
  setStatus('fetching token…');

  const r = await fetch(`/livekit/token?identity=guest-${Math.random().toString(36).slice(2,8)}`);
  const j = await r.json();
  if (j.error) { setStatus('token error: ' + j.error, 'err'); connectBtn.disabled = false; return; }

  room = new Room({
    adaptiveStream: true,
    dynacast: true,
  });

  room
    .on(RoomEvent.Connected, () => {
      setStatus('connected', 'live');
      hint.textContent = 'just speak — the agent will hear you and reply';
    })
    .on(RoomEvent.Disconnected, () => {
      setStatus('disconnected', 'err');
      micDot.classList.remove('on');
      agentDot.classList.remove('on');
      connectBtn.classList.remove('live');
      connectBtn.textContent = 'connect';
      connectBtn.disabled = false;
      connected = false;
    })
    .on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
      if (track.kind === Track.Kind.Audio) {
        const el = track.attach();
        el.autoplay = true;
        document.body.appendChild(el);
        agentDot.classList.add('on');
      }
    })
    .on(RoomEvent.ActiveSpeakersChanged, speakers => {
      const agentOn = speakers.some(s => !s.isLocal);
      agentDot.classList.toggle('on', agentOn);
      handleAgentSpeaking(agentOn);
    })
    // Transcriptions: agent emits them via the SDK's TranscriptionReceived event.
    .on(RoomEvent.TranscriptionReceived, (segments, participant) => {
      const isLocal = participant && participant.isLocal;
      for (const s of segments) {
        const who = isLocal ? 'you' : 'them';
        bubble(s.id, who, s.text, !s.final);
      }
    });

  await room.connect(j.url, j.token);

  connected = true;
  connectBtn.classList.add('live');
  connectBtn.textContent = 'disconnect';
  connectBtn.disabled = false;
  modeGroup.style.display = 'inline-flex';
  modeBtns.forEach(b => b.disabled = false);
  applyMode();
}

async function disconnect() {
  if (room) {
    await room.disconnect();
    room = null;
  }
  modeBtns.forEach(b => b.disabled = true);
  interjectBtn.disabled = true;
  interjectBtn.style.display = 'none';
  agentSpeaking = false;
  userOverride = false;
  if (agentOffTimer) { clearTimeout(agentOffTimer); agentOffTimer = null; }
  refreshUI();
}

function handleAgentSpeaking(speaking) {
  if (speaking) {
    if (agentOffTimer) { clearTimeout(agentOffTimer); agentOffTimer = null; }
    if (!agentSpeaking) {
      agentSpeaking = true;
      // override is "for one phrase" — new agent phrase cancels it
      if (mode === Mode.AUTO) userOverride = false;
      applyMode();
    }
  } else if (agentSpeaking && !agentOffTimer) {
    // debounce: ride short pauses between sentences before unmuting
    agentOffTimer = setTimeout(() => {
      agentOffTimer = null;
      agentSpeaking = false;
      applyMode();
    }, 600);
  }
}

function applyMode() {
  if (!room?.localParticipant) { refreshUI(); return; }
  let micOn;
  if (mode === Mode.ALWAYS_ON) micOn = true;
  else if (mode === Mode.ALWAYS_OFF) micOn = false;
  else micOn = userOverride || !agentSpeaking;
  // setMicrophoneEnabled is idempotent; safe to call every time
  room.localParticipant.setMicrophoneEnabled(micOn);
  refreshUI();
}

function refreshUI() {
  modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  let micOn;
  if (mode === Mode.ALWAYS_ON) micOn = true;
  else if (mode === Mode.ALWAYS_OFF) micOn = false;
  else micOn = userOverride || !agentSpeaking;
  micDot.classList.toggle('on', micOn);
  micDot.classList.toggle('muted', !micOn);
  if (mode === Mode.AUTO) {
    micLabel.textContent = userOverride ? 'mic · user-on' : (agentSpeaking ? 'mic · auto-off' : 'mic · auto-on');
  } else {
    micLabel.textContent = 'mic · ' + mode;
  }
  // interject button: visible only in AUTO mode while mic is muted
  const showInterject = connected && mode === Mode.AUTO && agentSpeaking && !userOverride;
  interjectBtn.style.display = showInterject ? 'inline-block' : 'none';
  interjectBtn.disabled = !showInterject;
}

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    mode = btn.dataset.mode;
    userOverride = false;
    applyMode();
  });
});

interjectBtn.addEventListener('click', () => {
  if (mode !== Mode.AUTO || !agentSpeaking) return;
  userOverride = true;
  applyMode();
});

// Spacebar shortcut in AUTO mode: works as override (same as interject button).
window.addEventListener('keydown', e => {
  if (e.code !== 'Space' || e.repeat) return;
  if (document.activeElement?.tagName === 'BUTTON' || document.activeElement?.tagName === 'INPUT') return;
  if (!connected || mode !== Mode.AUTO || !agentSpeaking || userOverride) return;
  e.preventDefault();
  userOverride = true;
  applyMode();
});

connectBtn.addEventListener('click', () => {
  if (!connected) connect();
  else disconnect();
});
</script>
</body>
</html>
